name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  CARGO_LOCKED:     "--locked"

jobs:
  check:
    name: Format, Lint, Test
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system libraries
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libssl-dev libsqlite3-dev pkg-config

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        run: rustup show

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests (locked dependency tree)
        run: cargo test --workspace --all-targets --locked

      - name: Documentation check
        run: cargo xtask docs-check

  version-consistency:
    name: Version consistency
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check Cargo.lock is committed
        run: test -f Cargo.lock || (echo "Cargo.lock missing from repo" && exit 1)
      - name: Check rust-toolchain.toml is present
        run: test -f rust-toolchain.toml || (echo "rust-toolchain.toml missing" && exit 1)
